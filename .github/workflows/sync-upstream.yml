name: Sync fork with upstream

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v5
        with:
          fetch-depth: 0

      - name: Sync from upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/projectbluefin/finpilot.git
          git fetch upstream main

          if git merge upstream/main --no-edit; then
            if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
              git push
              echo "Synced successfully with upstream."
            else
              echo "Already up to date."
            fi
          else
            git merge --abort
            echo "Merge conflict detected — creating issue for manual resolution."
            gh issue create \
              --title "Upstream sync failed: merge conflict" \
              --body "Automatic merge from \`projectbluefin/finpilot\` main failed due to conflicts. Please resolve manually." \
              --label "upstream-sync" || true
          fi
